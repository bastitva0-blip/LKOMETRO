<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Apply the saved/system theme before first paint to avoid a flash of
      // the wrong theme. Mirrors the logic in src/contexts/ThemeContext.tsx.
      (function () {
        try {
          var pref = localStorage.getItem("lkometro:themePreference");
          var isDark =
            pref === "dark" ||
            (pref !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", isDark);
          document.documentElement.style.colorScheme = isDark ? "dark" : "light";
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />

    <!-- Primary SEO -->
    <title>Lucknow Metro — Live Train Tracking, Fare Calculator & Route Planner | LkoMetro</title>
    <meta
      name="description"
      content="Lucknow Metro live train tracking, fare calculator, route planner and station info for the Red Line. Check metro timings, fares (₹10–₹60), and plan your journey. Free PWA, works offline."
    />
    <meta name="keywords" content="Lucknow Metro, Lucknow Metro fare, Lucknow Metro route, Lucknow Metro timing, Lucknow Metro map, Lucknow Metro Red Line, UPMRC, लखनऊ मेट्रो, metro train Lucknow, Lucknow Metro stations, metro fare calculator Lucknow, LkoMetro" />
    <meta name="author" content="Astitva Bhardwaj" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Canonical — always your production domain -->
    <link rel="canonical" href="https://www.lucknowmetro.in/" />

    <!-- Geo / regional signals -->
    <meta name="geo.region" content="IN-UP" />
    <meta name="geo.placename" content="Lucknow, Uttar Pradesh, India" />
    <meta name="geo.position" content="26.8467;80.9462" />
    <meta name="ICBM" content="26.8467, 80.9462" />

    <!-- Theme -->

    <!-- JSON-LD: FAQ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What are Lucknow Metro fares?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Lucknow Metro fares range from ₹10 for 1 station to ₹60 for 18 or more stations on the Red Line. Use the LkoMetro fare calculator to find the exact fare between any two stations."
            }
          },
          {
            "@type": "Question",
            "name": "What are Lucknow Metro timings / operating hours?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Lucknow Metro Red Line operates from 6:00 AM to 10:00 PM daily. During peak hours (8–11 AM and 5–8 PM on weekdays) trains run every 5 minutes 30 seconds. Off-peak frequency is approximately every 8 minutes."
            }
          },
          {
            "@type": "Question",
            "name": "How many stations does the Lucknow Metro Red Line have?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The Lucknow Metro Red Line has 21 stations from CCS Airport to Munshipulia, covering 22.87 km. Underground stations are Hussainganj, Sachivalaya, and Hazratganj."
            }
          },
          {
            "@type": "Question",
            "name": "How do I plan a route on the Lucknow Metro?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Use the LkoMetro route planner at lucknowmetro.in. Select your source and destination station to instantly get travel time, number of stops, and the exact fare."
            }
          },
          {
            "@type": "Question",
            "name": "Is LkoMetro an official UPMRC app?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. LkoMetro is an independent community-built companion app and is not affiliated with or endorsed by UPMRC or any government entity. Timings and fares are sourced from the official UPMRC website."
            }
          },
          {
            "@type": "Question",
            "name": "What is the fare from Charbagh to Hazratganj on the Lucknow Metro?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The fare from Charbagh to Hazratganj on the Lucknow Metro Red Line is ₹20 (2 stations apart). The journey takes approximately 4 minutes."
            }
          },
          {
            "@type": "Question",
            "name": "How do I check my Go Smart card balance?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "You can check your UPMRC Go Smart card balance directly on LkoMetro at lucknowmetro.in using the Go Smart card balance checker feature."
            }
          },
          {
            "@type": "Question",
            "name": "Does LkoMetro work offline?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. LkoMetro is a Progressive Web App (PWA) and works offline after the first visit. You can search stations, check fares, and plan routes without an internet connection."
            }
          }
        ]
      }
    </script>
