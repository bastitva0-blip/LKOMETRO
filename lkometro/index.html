<!doctype html>
<html lang="en-IN">

    <meta charset="UTF-8" />
    <script>
      // Apply the saved/system theme before first paint to avoid a flash of
      // the wrong theme. Mirrors the logic in src/contexts/ThemeContext.tsx.
      (function () {
        try {
          var pref = localStorage.getItem("lkometro:themePreference");
          var isDark =
            pref === "dark" ||
            (pref !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", isDark);
          document.documentElement.style.colorScheme = isDark ? "dark" : "light";
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />

    />

    <meta name="theme-color" content="#6E0C28" media="(prefers-color-scheme: dark)" />
